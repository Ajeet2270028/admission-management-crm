spring.application.name=admission-crm

# ===============================
# = DATABASE (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/admissiondb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=kiit@75620
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# = JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ===============================
# = SERVER
# ===============================
server.port=8080

# ===============================
# = JWT
# ===============================
app.jwt.secret=edumerge-super-secret-key-for-admission-crm-2024-long-enough
app.jwt.expiration-ms=86400000

# ===============================
# = CORS
# ===============================
app.cors.allowed-origins=http://localhost:3000
















